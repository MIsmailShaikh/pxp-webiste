<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - PeopleXplus (PXP)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/pricing.v2.css">
    <link rel="stylesheet" href="css/output.v2.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script defer src="js/global-animations.js"></script>
</head>
<body class="bg-gray-50 font-inter antialiased min-h-screen relative overflow-hidden flex items-center justify-center p-4">
    <!-- Abstract background elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-600 rounded-full blur-[120px] opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-600 rounded-full blur-[120px] opacity-20"></div>
    <div class="absolute top-[20%] right-[-10%] w-[40%] h-[40%] bg-sky-400 rounded-full blur-[100px] opacity-20"></div>

    <!-- Login Modal Card -->
    <div class="bg-white/80 backdrop-blur-xl border border-white/50 rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden relative z-10 p-6 md:p-8 flex flex-col gap-5">
        <div class="text-center">
            <a href="index.html">
                <img width="400" height="157" src="./pxp-logo.png" alt="PXP Logo" class="h-8 w-auto mx-auto mb-4 hover:opacity-80 transition-opacity">
            </a>
            <h3 class="text-2xl font-bold text-gray-900 mb-1">Welcome to PXP</h3>
            <p class="text-sm text-gray-500">Login or create an account</p>
        </div>
        
        <div class="flex flex-col gap-4">
            <div>
                <label class="text-xs font-semibold text-gray-700 mb-1 block">Email address</label>
                <input type="email" id="auth-email" class="w-full bg-white/50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" placeholder="name@company.com">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-700 mb-1 block">Password</label>
                <input type="password" id="auth-password" class="w-full bg-white/50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" placeholder="••••••••">
            </div>
        </div>
        
        <button id="btn-submit-auth" class="w-full bg-black text-white rounded-xl py-3.5 font-bold text-sm hover:bg-gray-800 transition-all shadow-lg shadow-black/10 flex items-center justify-center">
            Continue Securely
        </button>
    </div>

    <script>
        // Init Lucide
        window.addEventListener('load', () => {
            if (window.lucide) {
                lucide.createIcons();
            }
        });

        const submitBtn = document.getElementById('btn-submit-auth');
        
        submitBtn.addEventListener('click', () => {
            const email = document.getElementById('auth-email').value;
            
            // Show loading state
            submitBtn.innerHTML = '<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin mx-auto"></div>';
            
            setTimeout(() => {
                // Simulate successful auth
                localStorage.setItem('pxp_logged_in', 'true');
                if(email) localStorage.setItem('pxp_email', email);
                
                // Check if there is an intended URL
                const intendedUrl = localStorage.getItem('pxp_intended_url');
                
                if (intendedUrl) {
                    // Clear it so it doesn't loop
                    localStorage.removeItem('pxp_intended_url');
                    // Redirect to intended url
                    window.location.replace(intendedUrl);
                } else {
                    // Default fallback redirect to index or dashboard
                    window.location.replace('index.html');
                }
            }, 800);
        });
    </script>
</body>
</html>
